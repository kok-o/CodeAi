services:
  - type: web
    name: codeai-app
    env: node
    plan: free
    buildCommand: VITE_API_URL=$RENDER_EXTERNAL_URL npm install --include=dev && npm run build && npm install --prefix server
    startCommand: node server/initDb.js && node server/seedVance.js && npm start --prefix server
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: codeai-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: OLLAMA_URL
        value: "" # Optional, fill in Render dashboard if needed
      - key: GEMINI_API_KEY
        value: "" # Optional, fill in Render dashboard if needed

databases:
  - name: codeai-db
    databaseName: codeai
    user: codeai_user
    plan: free
